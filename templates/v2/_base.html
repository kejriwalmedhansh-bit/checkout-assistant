<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Dealo V2{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1115; color: #e8eaed; line-height: 1.5;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 64px; }
    a { color: #6ea8fe; }
    h1 { font-size: 26px; margin: 0 0 4px; }
    h2 { font-size: 18px; margin: 32px 0 12px; border-bottom: 1px solid #2a2e37; padding-bottom: 6px; }
    .muted { color: #9aa0ab; font-size: 14px; }
    .brand { color: #6ea8fe; font-weight: 700; letter-spacing: .5px; }
    input[type=text], select {
      width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #2a2e37;
      background: #171a21; color: #e8eaed; font-size: 15px;
    }
    button {
      margin-top: 12px; padding: 12px 20px; border: 0; border-radius: 10px;
      background: #6ea8fe; color: #0f1115; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #85b7ff; }
    .card { background: #171a21; border: 1px solid #2a2e37; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .error { background: #3a1d1d; border: 1px solid #7a2e2e; color: #ffb4b4; border-radius: 10px; padding: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #23272f; vertical-align: top; }
    th { color: #9aa0ab; font-weight: 600; }
    .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #1e3a2a; color: #7ee2a8; margin-left: 8px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .grid .card { margin: 0; }
    .grid img { width: 100%; height: 110px; object-fit: contain; background: #fff; border-radius: 8px; }
    .thumbs { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .thumbs img { width: 56px; height: 56px; object-fit: contain; background: #fff; border-radius: 6px; }
    .hero-img { width: 200px; height: 200px; object-fit: contain; background: #fff; border-radius: 12px; float: right; margin-left: 16px; }
    .price { font-weight: 700; }
    .back { display: inline-block; margin-top: 24px; }
    @media (max-width: 560px) { .hero-img { float: none; display: block; margin: 0 0 16px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="brand">DEALO · V2</p>
    {% block body %}{% endblock %}
  </div>
</body>
</html>
