<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dealo</title>

    <!--
      First-paint canvas colour. Chakra only applies the `bg` token once the JS
      bundle has loaded and React has rendered, so without this the browser
      paints its default white first — a visible flash before the dark theme
      lands. Must stay in sync with the `bg` token in
      src/theme/foundations/colors.js.
    -->
    <style>
      html { background-color: #121311; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
