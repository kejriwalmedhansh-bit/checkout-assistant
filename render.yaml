# Render Blueprint — auto-deploys on every push to the connected branch.
# Setup (one time):
#   1. Push this file to GitHub.
#   2. Render Dashboard → New → Blueprint → connect this repo.
#   3. When prompted, paste SEARCHAPI_KEY and the WHATSAPP_* secrets.
# After that, every push to the connected branch redeploys automatically.
services:
  - type: web
    name: dealo-backend
    runtime: python
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: "pip install -r requirements.txt"
    # $PORT is injected by Render; uvicorn must bind to it and to 0.0.0.0.
    startCommand: "uvicorn src.application:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      # Project requires Python >=3.11 (pyproject.toml). Pin explicitly so
      # Render doesn't fall back to an older default.
      - key: PYTHON_VERSION
        value: "3.12.7"
      # sync: false → NOT stored in the repo. Render prompts for these on the
      # first Blueprint deploy and keeps them as encrypted secrets.
      - key: SEARCHAPI_KEY
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
